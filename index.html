<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<title>رمضان پیکیج اہلیت چیک</title>

<!-- Urdu Nastaleeq Font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">

<style>
/* Body and Background */
body {
  margin:0;
  padding:0;
  font-family:'Noto Nastaliq Urdu', serif;
  background: linear-gradient(#0f5132, #14532d);
  color:white;
  text-align:center;
  min-height:100vh;
  background-image: url('https://i.ibb.co/8bCq7nR/mosque-bg.png'); /* mosque illustration */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Header */
.header {
  background: #064e3b;
  padding: 25px 0;
  font-size: 42px;
  font-weight: bold;
  border-bottom: 4px solid gold;
  color: gold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Main Card */
.box {
  background: rgba(255,255,255,0.95);
  color: #064e3b;
  width: 90%;
  max-width: 450px;
  margin: 60px auto;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

/* Title */
.title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 25px;
  color: #064e3b;
}

/* Input */
input {
  width: 80%;
  padding: 12px;
  font-size: 18px;
  border-radius: 8px;
  border: 1px solid #ccc;
  text-align: center;
  margin-bottom: 15px;
}

/* Button */
button {
  padding: 12px 30px;
  font-size: 18px;
  background: #198754;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #157347;
}

/* Result */
#result {
  margin-top: 25px;
  font-size: 22px;
  font-weight: bold;
}

/* Footer */
.footer {
  margin-top: 60px;
  font-size: 18px;
  color: #f0f0f0;
}

/* Lantern Decoration */
.lantern {
  position: absolute;
  width: 60px;
  top: 10px;
  animation: float 3s infinite alternate;
}

.lantern-left { left: 20px; }
.lantern-right { right: 20px; }

@keyframes float {
  0% { transform: translateY(0px); }
  100% { transform: translateY(15px); }
}

@media(max-width:500px){
  .header{ font-size:32px; padding:15px;}
  .box{ padding:25px; }
  input{ width:90%; font-size:16px;}
  button{ font-size:16px; padding:10px 20px; }
  #result{ font-size:20px; }
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">ضلع ہری پور</div>

<!-- Lanterns -->
<img src="https://i.ibb.co/q5zsm6Q/lantern.png" class="lantern lantern-left">
<img src="https://i.ibb.co/q5zsm6Q/lantern.png" class="lantern lantern-right">

<!-- Main Card -->
<div class="box">
  <div class="title">رمضان پیکیج اہلیت چیک کریں</div>
  <input type="text" id="cnic" placeholder="اپنا شناختی کارڈ نمبر درج کریں">
  <br>
  <button onclick="check()">چیک کریں</button>
  <div id="result"></div>
</div>

<div class="footer">رمضان المبارک 🌙</div>

<script>
function check() {
  const cnic = document.getElementById("cnic").value.replace(/-/g,'').trim();
  fetch("/check", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({cnic:cnic})
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("result").innerText = data.message;
  });
}
</script>

</body>
</html>
