<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<title>رمضان پیکیج اہلیت چیک</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai&display=swap" rel="stylesheet">

<style>
/* General body styling */
body {
  font-family: 'Almarai', sans-serif;
  background: linear-gradient(to bottom, #fceabb, #f8b500);
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Main container box */
.box {
  background: rgba(255, 255, 255, 0.95);
  padding: 50px 40px;
  border-radius: 20px;
  text-align: center;
  width: 400px;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
  position: relative;
}

/* Decorative moon */
.box::before {
  content: '🌙';
  font-size: 60px;
  position: absolute;
  top: -30px;
  right: -30px;
}

/* Title */
h2 {
  color: #7b3f00;
  margin-bottom: 30px;
  font-size: 26px;
}

/* Input */
input {
  padding: 12px;
  width: 100%;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 10px;
  text-align: center;
}

/* Button */
button {
  padding: 12px 30px;
  margin-top: 20px;
  background: #ff9900;
  color: white;
  border: none;
  font-size: 18px;
  font-weight: bold;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #e68a00;
}

/* Result */
#result {
  margin-top: 25px;
  font-size: 20px;
  font-weight: bold;
  color: #333;
}

/* Footer decoration */
.footer {
  position: absolute;
  bottom: -40px;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 14px;
}
</style>
</head>

<body>
<div class="box">
  <h2>رمضان پیکیج اہلیت چیک کریں</h2>
  
  <input type="text" id="cnic" placeholder="CNIC درج کریں">
  
  <button onclick="check()">چیک کریں</button>
  
  <div id="result"></div>
  
  <div class="footer">🌙 رمضان المبارک 2026 🌙</div>
</div>

<script>
function check(){
  const cnic = document.getElementById("cnic").value.replace(/-/g,'').trim();

  fetch("/check",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({cnic:cnic})
  })
  .then(res=>res.json())
  .then(data=>{
    const resultEl = document.getElementById("result");
    resultEl.innerText = data.message;
    resultEl.style.color = data.message.includes('اہل ہیں') ? 'green' : 'red';
  });
}
</script>
</body>
</html>
