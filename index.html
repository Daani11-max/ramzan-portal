<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<title>رمضان پیکیج اہلیت چیک</title>

<!-- Urdu Nastaleeq Font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">

<style>
/* Body */
body {
  margin:0;
  padding:0;
  font-family:'Noto Nastaliq Urdu', serif;
  background: #e6f2e6; /* light green for clean gov portal look */
  color: #064e3b;
  text-align:center;
  min-height:100vh;
}

/* Header */
.header {
  background: #064e3b;
  padding: 20px 0;
  font-size: 42px;
  font-weight: bold;
  color: gold;
  border-bottom: 4px solid #198754;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Main Card */
.box {
  background: white;
  color: #064e3b;
  width: 90%;
  max-width: 450px;
  margin: 60px auto;
  padding: 35px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

/* Title */
.title {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 25px;
  color: #064e3b;
}

/* Input */
input {
  width: 80%;
  padding: 12px;
  font-size: 18px;
  border-radius: 6px;
  border: 1px solid #ccc;
  text-align:center;
  margin-bottom: 15px;
}

/* Button */
button {
  padding: 12px 30px;
  font-size: 18px;
  background: #198754;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #157347;
}

/* Result */
#result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}

/* Footer */
.footer {
  margin-top: 50px;
  font-size: 16px;
  color: #064e3b;
}

@media(max-width:500px){
  .header{ font-size:32px; padding:15px;}
  .box{ padding:25px; }
  input{ width:90%; font-size:16px;}
  button{ font-size:16px; padding:10px 20px; }
  #result{ font-size:18px; }
}
</style>
</head>

<body>

<div class="header">ضلع ہری پور</div>

<div class="box">
  <div class="title">رمضان پیکیج اہلیت چیک کریں</div>
  <input type="text" id="cnic" placeholder="اپنا شناختی کارڈ نمبر درج کریں">
  <br>
  <button onclick="check()">چیک کریں</button>
  <div id="result"></div>
</div>

<div class="footer">© ضلع ہری پور | رمضان المبارک</div>

<script>
function check() {
  const cnic = document.getElementById("cnic").value.replace(/-/g,'').trim();
  fetch("/check", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({cnic:cnic})
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("result").innerText = data.message;
  });
}
</script>

</body>
</html>
